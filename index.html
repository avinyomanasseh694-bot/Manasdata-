<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Store</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007bff">

<style>
body{font-family:Arial;margin:0;text-align:center;background:#f4f4f4;}
header{background:#007bff;color:white;padding:15px;}
.section-btn{padding:10px 15px;margin:5px;border:none;border-radius:5px;background:#007bff;color:white;cursor:pointer;}
.product{background:white;margin:10px auto;padding:15px;border-radius:8px;max-width:300px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.product button{padding:8px 12px;background:green;color:white;border:none;border-radius:5px;cursor:pointer;}
#adminPanel{display:none;margin-top:20px;}
</style>
</head>

<body>

<header>
<h2>My Affiliate Store</h2>

<button class="section-btn" onclick="showLogin()">Login</button>
<button class="section-btn" onclick="showSignup()">Sign Up</button>
<button class="section-btn" onclick="logout()">Logout</button>
</header>

<div id="authSection"></div>

<h2>Products</h2>

<div class="product">
<h3>1GB Bundle</h3>
<button onclick="placeOrder('1GB Bundle')">Order</button>
</div>

<div class="product">
<h3>Affiliate Ebook</h3>
<button onclick="placeOrder('Affiliate Ebook')">Buy</button>
</div>

<div id="adminPanel">
<h2>👨‍💼 Admin Dashboard</h2>
<div id="ordersList"></div>
<button onclick="loadOrders()">Refresh Orders</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDyjPIhbsypZWkJrmSXqyggEc4aj-9OxeI",
  authDomain: "manassdata.firebaseapp.com",
  projectId: "manassdata",
  storageBucket: "manassdata.firebasestorage.app",
  messagingSenderId: "88384740672",
  appId: "1:88384740672:web:66018fe5ca982039872ea5"
};


const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

/* SIGN UP */
window.signup = async function(email,password){
  const userCredential = await createUserWithEmailAndPassword(auth,email,password);

  await setDoc(doc(db,"users",userCredential.user.uid),{
    email: email,
    role: "user"
  });

  alert("Account Created");
}

/* LOGIN */
window.login = async function(email,password){
  await signInWithEmailAndPassword(auth,email,password);
  alert("Logged In");
}

/* LOGOUT */
window.logout = function(){
  signOut(auth);
}

/* PLACE ORDER */
window.placeOrder = async function(product){

  if(!currentUser){
    alert("Please login first");
    return;
  }

  await addDoc(collection(db,"orders"),{
    product: product,
    userEmail: currentUser.email,
    status: "pending",
    createdAt: new Date()
  });

  alert("Order Placed");
}

/* LOAD ORDERS (ADMIN ONLY) */
window.loadOrders = async function(){

  const snapshot = await getDocs(collection(db,"orders"));
  let output = "";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();

    output += `
      <div style="background:white;margin:10px;padding:10px;border-radius:8px;">
        <p><b>Product:</b> ${data.product}</p>
        <p><b>User:</b> ${data.userEmail}</p>
        <p><b>Status:</b> ${data.status}</p>
      </div>
    `;
  });

  document.getElementById("ordersList").innerHTML = output;
}

/* AUTH STATE */
onAuthStateChanged(auth, async (user)=>{
  currentUser = user;

  if(user){

    const userDoc = await getDoc(doc(db,"users",user.uid));

    if(userDoc.exists() && userDoc.data().role==="admin"){
      document.getElementById("adminPanel").style.display="block";
    }
  }
});

</script>

</body>
</html>
