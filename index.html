<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Affiliate Store</title>
<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:url('https://image2url.com/r2/default/images/1773454517075-c2639eff-f38f-4d7b-bc30-93e02b27a012.png') no-repeat center center fixed;
background-size:cover;
text-align:center;
box-sizing:border-box;
}
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
backdrop-filter:blur(3px);
background:rgba(0,0,0,0.4);
z-index:-1;
}
*,*:before,*:after{box-sizing:border-box;}
header{
background:rgba(0,0,0,0.7);
color:white;
padding:20px;
}
.header-buttons{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px;}
.section-btn{padding:12px 18px;border:none;border-radius:6px;background:#007bff;color:white;cursor:pointer;margin:5px;}
.contact-btn{background:blue;}
.phone-btn{background:#28a745;}
.network-buttons{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin:15px 0;}
.network-buttons button{padding:10px 15px;border:none;border-radius:6px;background:#28a745;color:white;cursor:pointer;min-width:100px;}
.products{display:none;padding:20px;}
.product{background:rgba(255,255,255,0.95);margin:15px auto;padding:15px;border-radius:10px;width:100%;max-width:400px;box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.product img{width:100%;border-radius:8px;}
.product a button{margin-top:10px;padding:10px 15px;border:none;border-radius:5px;background:green;color:white;cursor:pointer;width:100%;}
footer{background:rgba(0,0,0,0.8);color:white;padding:15px;margin-top:20px;}
@media(max-width:600px){.header-buttons a,.header-buttons button{width:100%;}}
</style>
</head>
<body>

<header>
<h1>🔥 My Affiliate Store</h1>
<p>Best Data Bundles, Ebooks & Hot Deals</p>
<div class="header-buttons">
<a href="https://wa.me/0535433825" target="_blank"><button class="section-btn contact-btn">💬 WhatsApp</button></a>
<a href="tel:0535433825"><button class="section-btn phone-btn">📞 Call us </button></a>
</div>
</header>

<button class="section-btn" onclick="showSection('bundles')">📶 Data Bundles</button>
<button class="section-btn" onclick="showSection('ebooks')">📚 Ebooks</button>
<button class="section-btn" onclick="showSection('sale')">🔥 Hot on Sale</button>
</button>
<button class="section-btn" onclick="showSection('display')"> Courses</button>
<div id="bundles" class="products">
<h2>Select Network</h2>
<div class="network-buttons">
<button onclick="loadBundles('mtn')">MTN</button>
<button onclick="loadBundles('airteltigo')">AirtelTigo</button>
<button onclick="loadBundles('telecel')">Telecel</button>
</div>
<div id="bundleList"></div>
</div>

<div id="ebooks" class="products">
  <h2>Select Ebook title</h2>
</div>
<div id="sale" class="products">
  <h2>Selecr product</h2>
</div>
<div id="display" class="products">
  <h2>Coming soon</h2>
</div>
<footer>
<p>coyright&copy 2026 Powered by: Manasseh_Entreprise</p>
</footer>

<script>
function showSection(id){
document.querySelectorAll('.products').forEach(p=>p.style.display='none');
document.getElementById(id).style.display='block';
}

function createProduct(name, link, image){
return `
<div class="product">
<img src="${image}" alt="${name}">
<h3>${name}</h3>
<a href="${link}" target="_blank">
<button>Buy</button>
</a>
</div>
`;
}

function loadBundles(network){
const list=document.getElementById('bundleList');
list.innerHTML='<b>Cheap and fast deliver</b>y';
let data=[];

if(network==='mtn'){
data=["1GB - GHc5.3","2GB - GHc10","3GB - GHc15","4GB - GHc20","5GB - GHc24.5","6GB - GHc29","8GB - GHc39","10GB - GHc46","15GB - GHc65","20GB - GHc84","25GB - GHc108","30GB - GHc130","40GB - GHc168","50GB - GHc207","100GB - GHc409"];
}

if(network==='airteltigo'){
data=["1GB - GHc5.5","2GB - GHc10","3GB - GHc15","4GB - GHc20","5GB - GHc23","6GB - GHc28","7GB - GHc31","8GB - GHc35","10GB - GHc44","15GB - GHc64","20GB - GHc84","25GB - GHc102"];
}

if(network==='telecel'){
data=["10GB - GHc43","15GB - GHc63","20GB - GHc84","25GB - GHc105","30GB - GHc125","35GB - GHc144","40GB - GHc162","45GB - GHc179","50GB - GHc198","100GB - GHc382"];
}

// Replace # with your real link if needed

data.forEach(item=>{
list.innerHTML+=createProduct(item,'https://www.otessdata.com/store/manasseh-datahub',);
});
}

// Sample Ebooks
const ebooks=document.getElementById('ebooks');
for(let i=1;i<=1;i++){
ebooks.innerHTML+=createProduct("Ebook "+i,'#');
}

// Sample Hot Sale
const sale=document.getElementById('sale');
for(let i=1;i<=1;i++){
sale.innerHTML+=createProduct("Hot Product "+i,'https://wa.link/mwdj9o');
}
</script>

</body>
</html>
